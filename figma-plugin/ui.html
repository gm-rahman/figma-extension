<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      :root {
        --bg: #1c1c1e;
        --surface: #262629;
        --surface-hover: #2f2f33;
        --border: #343438;
        --text: #ececf1;
        --muted: #8a8a92;
        --accent: #7c5cfc;
        --accent-hover: #8f72ff;
        --ok: #46d39a;
        --err: #ff6b6b;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
        font-size: 12px; background: var(--bg); color: var(--text);
        display: flex; flex-direction: column; height: 100vh;
        -webkit-font-smoothing: antialiased;
      }
      header {
        display: flex; align-items: center; gap: 9px;
        padding: 13px 15px; border-bottom: 1px solid var(--border);
      }
      .logo {
        width: 22px; height: 22px; border-radius: 6px;
        background: linear-gradient(135deg, var(--accent), #00d4ff);
        display: flex; align-items: center; justify-content: center;
        font-weight: 700; font-size: 12px; color: #fff;
      }
      header h1 { font-size: 13px; font-weight: 650; letter-spacing: -0.01em; }
      .toolbar { padding: 11px 15px; display: flex; gap: 8px; border-bottom: 1px solid #2a2a2d; }
      .btn {
        padding: 8px 12px; border: none; border-radius: 8px; cursor: pointer;
        font-size: 12px; font-weight: 600; transition: background .12s, opacity .12s;
      }
      .btn-primary { background: var(--accent); color: #fff; flex: 1; }
      .btn-primary:hover { background: var(--accent-hover); }
      .btn-ghost { background: var(--surface); color: var(--text); font-weight: 550; }
      .btn-ghost:hover { background: var(--surface-hover); }
      .btn-import { background: var(--accent); color: #fff; padding: 6px 12px; font-size: 11px; border-radius: 7px; }
      .btn-import:hover { background: var(--accent-hover); }
      #capture-list { flex: 1; overflow-y: auto; padding: 10px 15px; }
      .card {
        display: flex; align-items: center; justify-content: space-between; gap: 10px;
        padding: 11px 12px; border-radius: 10px; background: var(--surface);
        margin-bottom: 8px; border: 1px solid transparent; transition: background .12s, border-color .12s;
      }
      .card:hover { background: var(--surface-hover); border-color: var(--border); }
      .card-info { display: flex; flex-direction: column; gap: 3px; overflow: hidden; }
      .card-title { font-size: 12.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .card-meta { font-size: 10.5px; color: var(--muted); }
      .badge {
        display: inline-block; font-size: 9.5px; font-weight: 600; color: #b9a8ff;
        background: #2a2740; border-radius: 5px; padding: 1px 6px; margin-left: 6px;
      }
      .empty { color: #5a5a60; font-size: 12px; text-align: center; margin-top: 56px; line-height: 1.6; }
      .status {
        padding: 10px 15px; font-size: 11px; min-height: 36px; white-space: pre-line;
        display: flex; align-items: center; border-top: 1px solid #2a2a2d;
      }
      .status.loading { color: #b9a8ff; }
      .status.success { color: var(--ok); }
      .status.error   { color: var(--err); }
      .status.idle    { color: var(--muted); }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">F</div>
      <h1>HTML to Figma</h1>
    </header>

    <div class="toolbar">
      <button class="btn btn-primary" id="btn-latest">Import Latest</button>
      <button class="btn btn-ghost" id="btn-refresh">Refresh</button>
    </div>

    <div id="capture-list"></div>
    <div class="status idle" id="status">Ready.</div>

    <script src="dist/ui.js"></script>
  </body>
</html>
