<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML to Figma</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        width: 280px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 13px;
        background: #1e1e1e;
        color: #e0e0e0;
      }

      header {
        padding: 14px 16px 10px;
        border-bottom: 1px solid #333;
      }

      header h1 {
        font-size: 14px;
        font-weight: 600;
        color: #fff;
      }

      header p {
        font-size: 11px;
        color: #888;
        margin-top: 2px;
      }

      .content { padding: 14px 16px; }

      .btn {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
        padding: 9px 12px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        transition: background 0.15s;
      }

      .btn-primary { background: #7c5cfc; color: #fff; }
      .btn-primary:hover { background: #6b4de0; }
      .btn-secondary { background: #2c2c2c; color: #e0e0e0; margin-top: 8px; }
      .btn-secondary:hover { background: #383838; }
      .btn:disabled { opacity: 0.45; cursor: not-allowed; }

      .status {
        margin-top: 12px;
        padding: 8px 10px;
        border-radius: 5px;
        font-size: 12px;
        display: none;
      }

      .status.success { background: #1a3a2a; color: #4caf82; display: block; }
      .status.error   { background: #3a1a1a; color: #f07070; display: block; }
      .status.loading { background: #2a2a3a; color: #9090f0; display: block; }

      .divider {
        margin: 12px 0;
        border: none;
        border-top: 1px solid #333;
      }

      .label {
        font-size: 11px;
        color: #777;
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>HTML to Figma</h1>
      <p>Capture the current page into Figma</p>
    </header>

    <div class="content">
      <p class="label">Capture mode</p>

      <button class="btn btn-primary" id="btn-full-page">
        Capture Full Page
      </button>

      <button class="btn btn-secondary" id="btn-select-element">
        Pick an Element
      </button>

      <hr class="divider" />

      <div class="status" id="status"></div>
    </div>

    <script src="dist/popup.js" type="module"></script>
  </body>
</html>
