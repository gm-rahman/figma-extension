<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML to Figma</title>
    <style>
      :root {
        --bg: #1c1c1e;
        --surface: #262629;
        --surface-hover: #2f2f33;
        --border: #343438;
        --text: #ececf1;
        --muted: #8a8a92;
        --accent: #7c5cfc;
        --accent-hover: #8f72ff;
        --ok: #46d39a;
        --err: #ff6b6b;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        width: 300px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
        font-size: 13px;
        background: var(--bg);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
      }
      header {
        display: flex; align-items: center; gap: 9px;
        padding: 15px 16px;
        border-bottom: 1px solid var(--border);
      }
      .logo {
        width: 24px; height: 24px; border-radius: 7px;
        background: linear-gradient(135deg, var(--accent), #00d4ff);
        display: flex; align-items: center; justify-content: center;
        font-weight: 700; font-size: 13px; color: #fff;
      }
      header h1 { font-size: 14px; font-weight: 650; letter-spacing: -0.01em; }
      header p { font-size: 11px; color: var(--muted); margin-top: 1px; }
      .content { padding: 16px; }
      .section-label {
        font-size: 10.5px; color: var(--muted); font-weight: 600;
        text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 9px;
      }
      .devices { display: flex; flex-direction: column; gap: 7px; margin-bottom: 16px; }
      .device {
        display: flex; align-items: center; gap: 10px;
        padding: 9px 11px; border-radius: 9px;
        background: var(--surface); border: 1px solid transparent;
        cursor: pointer; transition: background .12s, border-color .12s;
        user-select: none;
      }
      .device:hover { background: var(--surface-hover); }
      .device.checked { border-color: var(--accent); background: #2a2740; }
      .device input { display: none; }
      .tick {
        width: 17px; height: 17px; border-radius: 5px;
        border: 1.6px solid var(--border); flex-shrink: 0;
        display: flex; align-items: center; justify-content: center;
        transition: background .12s, border-color .12s;
      }
      .device.checked .tick { background: var(--accent); border-color: var(--accent); }
      .tick svg { opacity: 0; transition: opacity .12s; }
      .device.checked .tick svg { opacity: 1; }
      .device .name { flex: 1; font-weight: 550; }
      .device .w { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }

      .btn {
        display: flex; align-items: center; justify-content: center; gap: 8px;
        width: 100%; padding: 11px 12px; border: none; border-radius: 9px;
        cursor: pointer; font-size: 13px; font-weight: 600; letter-spacing: -0.01em;
        transition: background .12s, opacity .12s;
      }
      .btn-primary { background: var(--accent); color: #fff; }
      .btn-primary:hover { background: var(--accent-hover); }
      .btn-ghost { background: var(--surface); color: var(--text); margin-top: 8px; font-weight: 550; }
      .btn-ghost:hover { background: var(--surface-hover); }
      .btn:disabled { opacity: .5; cursor: not-allowed; }

      .status {
        margin-top: 13px; padding: 9px 11px; border-radius: 8px;
        font-size: 12px; line-height: 1.4; display: none; white-space: pre-line;
      }
      .status.success { background: #1432268f; color: var(--ok); display: block; }
      .status.error   { background: #3a1a1a8f; color: var(--err); display: block; }
      .status.loading { background: #221f3a8f; color: #b9a8ff; display: block; }
      .hint { margin-top: 12px; font-size: 11px; color: var(--muted); text-align: center; }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">F</div>
      <div>
        <h1>HTML to Figma</h1>
        <p>Capture this page into Figma</p>
      </div>
    </header>

    <div class="content">
      <p class="section-label">Viewports</p>
      <div class="devices" id="devices"></div>

      <button class="btn btn-primary" id="btn-capture">Capture Selected</button>
      <button class="btn btn-ghost" id="btn-select-element">Pick an Element</button>

      <div class="status" id="status"></div>
    </div>

    <script src="dist/popup.js" type="module"></script>
  </body>
</html>
